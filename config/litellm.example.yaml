model_list:
  - model_name: vertex-gemini-flash
    litellm_params:
      model: vertex_ai/gemini-2.5-flash
      vertex_project: os.environ/VERTEX_PRIMARY_PROJECT
      vertex_location: os.environ/VERTEX_PRIMARY_LOCATION
      vertex_credentials: /app/credentials/vertex-primary.json
      rpm: 120
  - model_name: vertex-gemini-flash
    litellm_params:
      model: vertex_ai/gemini-2.5-flash
      vertex_project: os.environ/VERTEX_SECONDARY_PROJECT
      vertex_location: os.environ/VERTEX_SECONDARY_LOCATION
      vertex_credentials: /app/credentials/vertex-secondary.json
      rpm: 120
  - model_name: vertex-gemini-pro
    litellm_params:
      model: vertex_ai/gemini-2.5-pro
      vertex_project: os.environ/VERTEX_PRIMARY_PROJECT
      vertex_location: os.environ/VERTEX_PRIMARY_LOCATION
      vertex_credentials: /app/credentials/vertex-primary.json
      rpm: 60
  - model_name: vertex-imagen-3
    litellm_params:
      model: vertex_ai/imagen-3.0-generate-002
      vertex_project: os.environ/VERTEX_PRIMARY_PROJECT
      vertex_location: os.environ/VERTEX_PRIMARY_LOCATION
      vertex_credentials: /app/credentials/vertex-primary.json
      rpm: 30

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  salt_key: os.environ/LITELLM_SALT_KEY
  json_logs: true

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  fallbacks:
    - vertex-gemini-pro:
        - vertex-gemini-flash

general_settings:
  disable_spend_logs: false

